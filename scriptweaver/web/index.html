<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptWeaver — 小说转剧本 AI</title>
<style>
:root {
  --bg: #f8f9fa; --card: #fff; --border: #dee2e6; --text: #212529;
  --muted: #6c757d; --primary: #0d6efd; --primary-hover: #0b5ed7;
  --success: #198754; --danger: #dc3545; --warning: #ffc107;
  --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.1);
}
[data-theme="dark"] {
  --bg: #1a1a2e; --card: #16213e; --border: #2a2a4a; --text: #e0e0e0;
  --muted: #888; --primary: #4dabf7; --primary-hover: #339af0;
  --shadow: 0 1px 3px rgba(0,0,0,.4);
}
.dark-toggle { background: none; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 16px; padding: 4px 10px; line-height: 1; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; font-weight: 600; }
.steps { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
.steps span { padding: 4px 10px; border-radius: 12px; font-size: 12px; background: var(--bg); border: 1px solid var(--border); }
.steps span.active { background: var(--primary); color: #fff; border-color: var(--primary); }
main { max-width: 900px; margin: 24px auto; padding: 0 16px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.card h2 { font-size: 16px; margin-bottom: 12px; }
.row { display: flex; gap: 8px; align-items: center; }
input, textarea, select, button { font: inherit; border-radius: 6px; padding: 8px 12px; }
input, textarea, select { border: 1px solid var(--border); width: 100%; }
textarea { min-height: 120px; resize: vertical; font-family: monospace; }
button { border: none; cursor: pointer; font-weight: 500; white-space: nowrap; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline { background: var(--card); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--bg); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; background: var(--bg); border: 1px solid var(--border); margin: 2px; }
.tag.blue { background: #cfe2ff; border-color: #9ec5fe; }
.tag.green { background: #d1e7dd; border-color: #a3cfbb; }
.tag.yellow { background: #fff3cd; border-color: #ffe69c; }
.scene-card { border-left: 3px solid var(--primary); padding-left: 12px; margin-bottom: 12px; }
.beat { padding: 6px 10px; margin: 4px 0; border-radius: 4px; font-size: 13px; }
.beat.action { background: #e9ecef; }
.beat.dialogue { background: #cfe2ff; }
.beat.voiceover { background: #f8d7da; }
.char-tag { font-weight: 600; color: var(--primary); }
.uncertainty-card { border: 1px solid var(--warning); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.option-btn { display: block; width: 100%; text-align: left; padding: 10px 14px; margin: 6px 0; border: 1px solid var(--border); border-radius: 6px; background: var(--card); cursor: pointer; }
.option-btn:hover { background: #e7f1ff; border-color: var(--primary); }
.option-btn.selected { background: #cfe2ff; border-color: var(--primary); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
button:disabled { opacity: .65; cursor: not-allowed; }
button .spinner { border-top-color: currentColor; border-color: rgba(255,255,255,.3); border-top-color: #fff; }
.info { color: var(--muted); font-size: 13px; }
pre { background: #f1f3f5; padding: 12px; border-radius: var(--radius); overflow-x: auto; font-size: 12px; max-height: 400px; }
</style>
</head>
<body>
<header>
  <h1>📜 ScriptWeaver</h1>
  <button class="dark-toggle" onclick="toggleDark()" title="切换深色模式">🌙</button>
  <div class="steps">
    <span data-step="1">1.创建</span><span data-step="2">2.上传</span>
    <span data-step="3">3.分析</span><span data-step="4">4.问答</span>
    <span data-step="5">5.确认</span><span data-step="6">6.计划</span>
    <span data-step="7">7.确认计划</span><span data-step="8">8.剧本</span>
    <span data-step="9">9.导出</span>
  </div>
</header>
<main>
  <div id="create-job" class="card">
    <h2>1. 创建任务</h2>
    <div class="row"><input id="job-id" placeholder="输入任务 ID，如 demo-001" value="demo-001"><button class="btn-primary" onclick="createJob()">创建</button><button class="btn-outline btn-sm" onclick="loadJobList()">刷新列表</button></div>
    <div id="job-list" class="info" style="margin-top:8px"></div>
  </div>

  <div id="upload-chapters" class="card hidden">
    <h2>2. 上传小说章节</h2>
    <p class="info">上传 .txt 文件或直接粘贴文本，自动按章节标题拆分。</p>
    <textarea id="chapter-text" placeholder="第一章 密信&#10;林照收到父亲留下的密信。&#10;&#10;第二章 阻拦&#10;沈微阻止公开。" oninput="updateWordCount()"></textarea>
    <div class="row" style="margin-top:4px"><span class="info" id="word-count"></span></div>
    <div class="row" style="margin-top:8px"><input type="file" id="file-input" accept=".txt" onchange="handleFile(this)"><button class="btn-primary" onclick="uploadText()">上传文本</button></div>
  </div>

  <div id="analysis-result" class="card hidden">
    <h2>3. AI 分析结果</h2>
    <div id="analysis-content"></div>
    <button class="btn-primary hidden" id="start-qa-btn" onclick="startQA()">开始逐题回答</button>
    <button class="btn-success hidden" id="skip-qa-btn" onclick="confirmAnalysis()">确认分析，生成计划</button>
  </div>

  <div id="uncertainty-qa" class="card hidden">
    <h2>4. 回答不确定项</h2>
    <div id="qa-content"></div>
    <button class="btn-primary hidden" id="confirm-analysis-btn" onclick="confirmAnalysis()">确认分析</button>
  </div>

  <div id="plan-result" class="card hidden">
    <h2>5-6. 改编计划</h2>
    <div id="plan-content"></div>
    <div class="row" style="margin-top:12px"><button class="btn-primary" onclick="confirmPlan()">确认计划</button></div>
  </div>

  <div id="screenplay-result" class="card hidden">
    <h2>8. 剧本</h2>
    <div id="screenplay-content"></div>
  </div>

  <div id="export-section" class="card hidden">
    <h2>9. 导出</h2>
    <div id="yaml-preview"></div>
    <div class="row" style="margin-top:8px"><input id="meta-title" placeholder="标题" value="未命名"><input id="meta-author" placeholder="作者"><button class="btn-success" onclick="exportYAML()">导出 YAML</button><button class="btn-outline" onclick="exportText()">导出文本</button></div>
  </div>
</main>

<script>
// Dark mode
(function(){const t=localStorage.getItem('sw-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
function toggleDark(){const el=document.documentElement;const is=el.getAttribute('data-theme')==='dark';if(is){el.removeAttribute('data-theme');localStorage.setItem('sw-theme','light');}else{el.setAttribute('data-theme','dark');localStorage.setItem('sw-theme','dark');}}

const API_BASE = 'http://127.0.0.1:8000';
let jobId = '';
let uncertaintyIndex = 0;
let uncertainties = [];
let charNames = {};  // character_id → name lookup

function charName(id) {
  if (!id) return '';
  return charNames[id] || id;
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body && !(body instanceof FormData)) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  else if (body instanceof FormData) { opts.body = body; }
  const r = await fetch(API_BASE + path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||'Unknown'); }
  const t = r.headers.get('content-type')||'';
  if (t.includes('application/x-yaml')||t.includes('text/')) return r.text();
  if (r.status===204||r.headers.get('content-length')==='0') return null;
  return r.json();
}

function show(...ids) {
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  ids.forEach(id=>document.getElementById(id).classList.remove('hidden'));
}

function setStep(n) {
  document.querySelectorAll('.steps span').forEach((s,i)=>s.classList.toggle('active', i+1===n));
}

async function createJob() {
  const btn = document.querySelector('#create-job .btn-primary');
  jobId = document.getElementById('job-id').value.trim();
  if (!jobId) return;
  setLoading(btn, true, '创建中…');
  try {
    await api('POST','/jobs',{job_id:jobId});
    show('upload-chapters'); setStep(2);
    loadJobList();
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

async function loadJobList() {
  try {
    const jobs = await api('GET','/jobs');
    const el = document.getElementById('job-list');
    if (!jobs||!jobs.length) { el.innerHTML='暂无任务'; return; }
    el.innerHTML = jobs.map(j=>
      '<span class="tag" style="cursor:pointer;margin:2px" onclick="resumeJob(\''+j.id+'\')" title="恢复任务">📋 '+j.id+'</span>'
    ).join('') +
    ' <button class="btn-danger btn-sm" onclick="deleteAllJobs()" style="margin-left:8px">清空全部</button>';
  } catch(e) { /* silent */ }
}

async function resumeJob(id) {
  jobId = id;
  const job = await api('GET','/jobs/'+id);
  if (job.chapters && job.chapters.length) show('upload-chapters');
  if (job.ai_analysis) { renderAnalysis(job.ai_analysis); show('analysis-result'); setStep(3); }
  if (job.adaptation_plan) { renderPlan(job.adaptation_plan); show('plan-result'); setStep(6); }
  if (job.screenplay_draft) { renderScreenplay(job.screenplay_draft); }
  document.getElementById('job-id').value = id;
}

async function deleteAllJobs() {
  if (!confirm('确定清空全部任务？此操作不可恢复。')) return;
  const jobs = await api('GET','/jobs');
  for (const j of jobs||[]) await api('DELETE','/jobs/'+j.id);
  loadJobList();
}

function handleFile(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e=> { document.getElementById('chapter-text').value = e.target.result; updateWordCount(); };
  r.readAsText(f);
}

function updateWordCount() {
  const text = document.getElementById('chapter-text').value;
  const chars = text.replace(/\s/g,'').length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('word-count').textContent = '字数：'+chars+' 字符 · ~'+words+' 词';
}

async function uploadText() {
  const text = document.getElementById('chapter-text').value.trim();
  if (!text) return;
  const btn = document.querySelector('#upload-chapters .btn-primary');
  setLoading(btn, true, '上传解析中…');
  try {
    const blob = new Blob([text],{type:'text/plain'});
    const fd = new FormData(); fd.append('file', blob, 'novel.txt');
    await api('POST','/jobs/'+jobId+'/upload', fd);
    await doAnalyze();
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

async function doAnalyze() {
  await api('POST','/jobs/'+jobId+'/analyze');
  const job = await api('GET','/jobs/'+jobId);
  renderAnalysis(job.ai_analysis);
  show('analysis-result'); setStep(3);
  if (job.ai_analysis.uncertainties && job.ai_analysis.uncertainties.length>0) {
    document.getElementById('start-qa-btn').classList.remove('hidden');
    document.getElementById('skip-qa-btn').classList.add('hidden');
  } else {
    document.getElementById('start-qa-btn').classList.add('hidden');
    document.getElementById('skip-qa-btn').classList.remove('hidden');
  }
}

function renderAnalysis(a) {
  if (!a) return;
  // Build character ID → name lookup
  (a.characters||[]).forEach(c=>{ charNames[c.id]=c.name; });
  let h='';
  if (a.characters&&a.characters.length) {
    h+='<h3>👤 人物 ('+a.characters.length+')</h3>';
    a.characters.forEach(c=>h+='<span class="tag blue">'+c.name+' ('+c.role+')</span> ');
  }
  if (a.key_events&&a.key_events.length) {
    h+='<h3>📌 关键事件</h3>';
    a.key_events.forEach(e=>h+='<div class="tag">'+e.summary+'</div>');
  }
  if (a.conflicts&&a.conflicts.length) {
    h+='<h3>⚡ 冲突</h3>';
    a.conflicts.forEach(c=>h+='<div class="tag yellow">'+c.description.substring(0,60)+'…</div>');
  }
  if (a.themes&&a.themes.length) {
    h+='<h3>💡 主题</h3>';
    a.themes.forEach(t=>h+='<div class="tag green">'+t.statement+'</div>');
  }
  if (a.uncertainties&&a.uncertainties.length) {
    h+='<h3>❓ 不确定项 ('+a.uncertainties.length+')</h3>';
  }
  document.getElementById('analysis-content').innerHTML=h||'<p>分析完成。</p>';
}

function startQA() { uncertaintyIndex=0; showQA(); show('uncertainty-qa'); setStep(4); }

async function showQA() {
  const r = await api('GET','/jobs/'+jobId+'/next-uncertainty');
  if (!r) {
    document.getElementById('qa-content').innerHTML='<p>✅ 所有问题已回答。</p>';
    document.getElementById('confirm-analysis-btn').classList.remove('hidden');
    return;
  }
  let h='<div class="uncertainty-card"><h3>'+r.question+'</h3><p class="info">'+r.context+'</p>';
  if (r.options) {
    r.options.forEach(o=>h+='<button class="option-btn" onclick="selectOption(\''+r.id+'\',\''+o.id+'\',this)">'+o.label+' — '+o.description+'<br><small class="info">影响：'+o.impact+'</small></button>');
  }
  if (r.allow_custom_answer) h+='<textarea id="custom-answer" placeholder="自定义回答…" style="margin-top:8px"></textarea><button class="btn-outline btn-sm" onclick="submitCustom(\''+r.id+'\')">提交自定义回答</button>';
  h+='</div>';
  document.getElementById('qa-content').innerHTML=h;
  document.getElementById('confirm-analysis-btn').classList.add('hidden');
}

async function selectOption(uid, oid, btn) {
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  setLoading(btn, true, '提交中…');
  try {
    await api('POST','/jobs/'+jobId+'/uncertainty-answer',{uncertainty_id:uid,selected_option_id:oid});
    await showQA();
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

async function submitCustom(uid) {
  const v = document.getElementById('custom-answer').value.trim();
  if (!v) return;
  const btn = document.querySelector('#qa-content .btn-outline');
  setLoading(btn, true, '提交中…');
  try {
    await api('POST','/jobs/'+jobId+'/uncertainty-answer',{uncertainty_id:uid,custom_answer:v});
    await showQA();
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

async function confirmAnalysis() {
  const btn = document.getElementById('confirm-analysis-btn');
  setLoading(btn, true, '生成计划中…');
  try {
    await api('POST','/jobs/'+jobId+'/confirm-analysis');
    await api('POST','/jobs/'+jobId+'/generate-plan');
    const job = await api('GET','/jobs/'+jobId);
    renderPlan(job.adaptation_plan);
    show('plan-result'); setStep(6);
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

let currentPlan = null;

function renderPlan(plan) {
  if (!plan) return;
  currentPlan = JSON.parse(JSON.stringify(plan)); // deep clone for editing
  refreshPlanUI();
}

function refreshPlanUI() {
  const plan = currentPlan;
  if (!plan) return;
  let h='<p><span class="tag">'+plan.target_format+'</span> '+plan.structure+'</p>';
  (plan.scenes||[]).forEach((s,i)=>{
    h+='<div class="scene-card">';
    h+='<div class="row"><strong>#'+(i+1)+'</strong>';
    h+='<span class="tag" style="cursor:pointer" onclick="editSceneTitle('+i+')" title="点击编辑标题">'+escapeHtml(s.title)+'</span>';
    h+='<span class="info" style="cursor:pointer" onclick="editScenePurpose('+i+')" title="点击编辑目的">'+escapeHtml(s.dramatic_purpose||'')+'</span>';
    if (i>0) h+='<button class="btn-outline btn-sm" onclick="moveScene('+i+',-1)">↑</button>';
    if (i<plan.scenes.length-1) h+='<button class="btn-outline btn-sm" onclick="moveScene('+i+',1)">↓</button>';
    h+='</div>';
    h+='<div>角色：'+(s.character_ids||[]).map(c=>'<span class="tag">'+charName(c)+'</span>').join('')+'</div>';
    h+='</div>';
  });
  h+='<p class="info">点击标题或目的可编辑，↑↓ 调整场景顺序</p>';
  document.getElementById('plan-content').innerHTML=h;
}

function editSceneTitle(i) {
  const s = currentPlan.scenes[i];
  const val = prompt('场景标题：', s.title);
  if (val && val.trim()) { s.title = val.trim(); s.scene_order = i+1; refreshPlanUI(); }
}

function editScenePurpose(i) {
  const s = currentPlan.scenes[i];
  const val = prompt('戏剧目的：', s.dramatic_purpose||'');
  if (val !== null) { s.dramatic_purpose = val.trim(); refreshPlanUI(); }
}

function moveScene(i, dir) {
  const scenes = currentPlan.scenes;
  const j = i + dir;
  if (j<0 || j>=scenes.length) return;
  [scenes[i], scenes[j]] = [scenes[j], scenes[i]];
  scenes.forEach((s, idx) => { s.scene_order = idx + 1; });
  refreshPlanUI();
}

async function confirmPlan() {
  const btn = document.querySelector('#plan-result .btn-primary');
  setLoading(btn, true, '生成剧本中…');
  try {
    const plan = currentPlan || (await api('GET','/jobs/'+jobId)).adaptation_plan;
    const scenes = (plan.scenes||[]).map(s=>({
      id:s.id,scene_order:s.scene_order,title:s.title,
      dramatic_purpose:s.dramatic_purpose,
      character_ids:s.character_ids||[],
      source_chapter_indexes:s.source_chapter_indexes||[],
    }));
    await api('POST','/jobs/'+jobId+'/confirm-plan',{
      target_format:plan.target_format,structure:plan.structure,scenes:scenes,review_questions:plan.review_questions||[],
    });
    await api('POST','/jobs/'+jobId+'/generate-screenplay');
    const j = await api('GET','/jobs/'+jobId);
    renderScreenplay(j.screenplay_draft);
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

let currentDraft = null;

function renderScreenplay(draft) {
  if (!draft||!draft.scenes) return;
  currentDraft = draft;
  let h='';
  draft.scenes.forEach((s,si)=>{
    h+='<div class="scene-card"><h3>'+s.id+'</h3>';
    if (s.heading) h+='<div class="info" style="cursor:pointer" title="点击编辑场景信息" onclick="editHeading('+si+')">📍 '+escapeHtml(s.heading.location)+' · '+escapeHtml(s.heading.time)+' · '+escapeHtml(s.heading.interior_exterior)+'</div>';
    (s.beats||[]).forEach((b,bi)=>{
      const cls = 'beat '+(b.type||'action');
      const char = b.character_id ? ' <span class="char-tag">'+charName(b.character_id)+'</span>' : '';
      h+='<div class="'+cls+'" style="cursor:pointer" title="点击编辑" data-scene="'+si+'" data-beat="'+bi+'">['+b.type+']'+char+'：<span class="beat-text">'+escapeHtml(b.text)+'</span></div>';
    });
    h+='<button class="btn-outline btn-sm" style="margin-top:6px" onclick="addBeat('+si+')">+ 添加 Beat</button></div>';
  });
  h+='<div id="beat-editor" class="card hidden" style="margin-top:12px"></div>';
  h+='<div class="row" style="margin-top:12px"><button class="btn-success" onclick="saveScreenplay()">💾 保存修改</button></div>';
  document.getElementById('screenplay-content').innerHTML=h||'<p>剧本生成完成。</p>';
  // Delegate click to beat editor
  document.getElementById('screenplay-content').addEventListener('click', function(e){
    const beatDiv = e.target.closest('[data-scene]');
    if (beatDiv) editBeat(+beatDiv.dataset.scene, +beatDiv.dataset.beat);
  });
  show('screenplay-result', 'export-section'); setStep(9);
}

function editBeat(si, bi) {
  const b = currentDraft.scenes[si].beats[bi];
  const types = ['action','dialogue','voiceover','transition'];
  let h = '<h3>编辑 Beat — '+currentDraft.scenes[si].id+' ['+bi+']</h3>';
  h += '<div class="row"><label>类型：<select id="edit-type">'+types.map(t=>'<option value="'+t+'"'+(b.type===t?' selected':'')+'>'+t+'</option>').join('')+'</select></label>';
  h += '<label style="margin-left:8px">角色ID：<input id="edit-char" value="'+escapeHtml(b.character_id||'')+'" placeholder="对话/旁白必填" style="width:150px"></label></div>';
  h += '<textarea id="edit-text" style="min-height:80px;margin-top:8px">'+escapeHtml(b.text)+'</textarea>';
  h += '<div class="row" style="margin-top:8px"><button class="btn-primary" onclick="saveBeat('+si+','+bi+')">确认</button><button class="btn-outline" onclick="closeEditor()">取消</button><button class="btn-danger btn-sm" style="margin-left:auto" onclick="deleteBeat('+si+','+bi+')">删除</button></div>';
  document.getElementById('beat-editor').innerHTML = h;
  document.getElementById('beat-editor').classList.remove('hidden');
  document.getElementById('beat-editor').scrollIntoView({behavior:'smooth'});
}

function saveBeat(si, bi) {
  const type = document.getElementById('edit-type').value;
  const text = document.getElementById('edit-text').value.trim();
  const cid = document.getElementById('edit-char').value.trim() || null;
  if (!text) return;
  currentDraft.scenes[si].beats[bi] = {type, text, character_id: cid};
  renderScreenplay(currentDraft);
}

function closeEditor() {
  document.getElementById('beat-editor').classList.add('hidden');
}

function addBeat(si) {
  currentDraft.scenes[si].beats.push({type:'action', text:'新 beat', character_id: null});
  renderScreenplay(currentDraft);
  editBeat(si, currentDraft.scenes[si].beats.length-1);
}

function deleteBeat(si, bi) {
  currentDraft.scenes[si].beats.splice(bi, 1);
  renderScreenplay(currentDraft);
}

function editHeading(si) {
  const h = currentDraft.scenes[si].heading || {location:'', time:'', interior_exterior:'INT'};
  let html = '<h3>编辑场景信息 — '+currentDraft.scenes[si].id+'</h3>';
  html += '<div class="row"><label>地点：<input id="edit-loc" value="'+escapeHtml(h.location||'')+'"></label>';
  html += '<label style="margin-left:8px">时间：<input id="edit-time" value="'+escapeHtml(h.time||'')+'"></label>';
  html += '<label style="margin-left:8px">内外景：<select id="edit-ie"><option value="INT"'+(h.interior_exterior==='INT'?' selected':'')+'>INT 内景</option><option value="EXT"'+(h.interior_exterior==='EXT'?' selected':'')+'>EXT 外景</option><option value="INT/EXT"'+(h.interior_exterior==='INT/EXT'?' selected':'')+'>INT/EXT 内外景</option></select></label></div>';
  html += '<div class="row" style="margin-top:8px"><button class="btn-primary" onclick="saveHeading('+si+')">确认</button><button class="btn-outline" onclick="closeEditor()">取消</button></div>';
  document.getElementById('beat-editor').innerHTML = html;
  document.getElementById('beat-editor').classList.remove('hidden');
  document.getElementById('beat-editor').scrollIntoView({behavior:'smooth'});
}

function saveHeading(si) {
  const loc = document.getElementById('edit-loc').value.trim();
  const time = document.getElementById('edit-time').value.trim();
  const ie = document.getElementById('edit-ie').value;
  if (!loc && !time) return;
  currentDraft.scenes[si].heading = {location: loc, time, interior_exterior: ie};
  renderScreenplay(currentDraft);
}

async function saveScreenplay() {
  const btn = document.querySelector('#screenplay-content .btn-success');
  setLoading(btn, true, '保存中…');
  try {
    const scenes = currentDraft.scenes.map(s=>({
      id: s.id,
      heading: s.heading || {location:'', time:'', interior_exterior:'INT'},
      beats: (s.beats||[]).map(b=>({
        type: b.type||'action',
        text: b.text||'',
        character_id: b.character_id||null
      }))
    }));
    await api('PATCH','/jobs/'+jobId+'/screenplay',{scenes});
    closeEditor();
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

async function exportYAML() {
  const btn = document.querySelector('#export-section .btn-success');
  setLoading(btn, true, '导出中…');
  try {
    const t = document.getElementById('meta-title').value;
    const a = document.getElementById('meta-author').value;
    const y = await api('GET','/jobs/'+jobId+'/export-yaml?title='+encodeURIComponent(t)+'&author='+encodeURIComponent(a)+'&target_format=short_drama&language=zh-CN');
    document.getElementById('yaml-preview').innerHTML='<pre>'+escapeHtml(y)+'</pre><br><a class="btn-success" href="data:application/x-yaml;charset=utf-8,'+encodeURIComponent(y)+'" download="'+jobId+'.yaml">⬇ 下载 YAML</a>';
    setStep(9);
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function exportText() {
  const btn = document.querySelector('#export-section .btn-outline');
  setLoading(btn, true, '导出中…');
  try {
    const text = await api('GET','/jobs/'+jobId+'/export-text');
    document.getElementById('yaml-preview').innerHTML='<pre>'+escapeHtml(text)+'</pre><br><a class="btn-primary" href="data:text/plain;charset=utf-8,'+encodeURIComponent(text)+'" download="'+jobId+'.txt">⬇ 下载文本</a>';
  } catch(e) { showError(e.message); }
  finally { setLoading(btn, false); }
}

// Loading state helper — saves/restores button text, shows spinner, disables
function setLoading(btn, loading, text) {
  if (loading) {
    btn._origText = btn.textContent;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>' + (text || '处理中…');
  } else {
    btn.disabled = false;
    btn.textContent = btn._origText || btn.textContent;
  }
}

// Show inline error in a card, auto-dismiss after 6s
function showError(msg) {
  let el = document.getElementById('error-banner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'error-banner';
    el.style.cssText = 'background:#f8d7da;border:1px solid #f5c2c7;color:#842029;padding:10px 16px;border-radius:8px;margin-bottom:16px;display:none;';
    document.querySelector('main').prepend(el);
  }
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.style.display = 'none', 6000);
}
</script>
</body>
</html>
